<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" /> <!-- Primary Violet -->
      <stop offset="100%" style="stop-color:#e91e63;stop-opacity:1" /> <!-- Accent Pink -->
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="#0f0f1a" /> <!-- Dark Theme Background -->
  
  <text x="50%" y="50%" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="280" fill="url(#primary-gradient)" text-anchor="middle" dy=".35em">XY</text>
</svg>
